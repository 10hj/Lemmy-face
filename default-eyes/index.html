<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Default Happy Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="face" aria-label="주변을 바라보다 반달 눈웃음을 짓는 가장 기본적인 표정">
      <div class="eye eye--left" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>
      <div class="eye eye--right" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>
      <span class="happy-eye happy-eye--left" aria-hidden="true"></span>
      <span class="happy-eye happy-eye--right" aria-hidden="true"></span>
    </main>
  </body>
</html>
