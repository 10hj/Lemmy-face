<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Heart Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="artwork" aria-label="Eyes changing into hearts and happy crescent eyes">
      <div class="eye eye--left" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <div class="eye eye--right" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <img class="heart heart--left" src="./assets/heart.svg" alt="" aria-hidden="true" />
      <img class="heart heart--right" src="./assets/heart.svg" alt="" aria-hidden="true" />

      <span class="happy-eye happy-eye--left" aria-hidden="true"></span>
      <span class="happy-eye happy-eye--right" aria-hidden="true"></span>

      <div class="floating-hearts" aria-hidden="true">
        <img class="spark-heart spark-heart--1" src="./assets/heart.svg" alt="" />
        <img class="spark-heart spark-heart--2" src="./assets/heart.svg" alt="" />
        <img class="spark-heart spark-heart--3" src="./assets/heart.svg" alt="" />
        <img class="spark-heart spark-heart--4" src="./assets/heart.svg" alt="" />
        <img class="spark-heart spark-heart--5" src="./assets/heart.svg" alt="" />
        <img class="spark-heart spark-heart--6" src="./assets/heart.svg" alt="" />
      </div>
    </main>
  </body>
</html>
