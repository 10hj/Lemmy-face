<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Sweating Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="face" aria-label="난처한 눈과 함께 땀이 쏟아지는 표정">
      <div class="eye eye--left" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>
      <div class="eye eye--right" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>
      <span class="sad-eye sad-eye--left" aria-hidden="true"></span>
      <span class="sad-eye sad-eye--right" aria-hidden="true"></span>

      <div class="sweat-field" aria-hidden="true">
        <img class="sweat sweat--1" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--2" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--3" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--4" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--5" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--6" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--7" src="./assets/sweat.svg" alt="" />
        <img class="sweat sweat--8" src="./assets/sweat.svg" alt="" />
      </div>
    </main>
  </body>
</html>
