<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Basic Happy Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="face" aria-label="부드럽게 둘러보고 눈웃음 짓는 기분 좋은 기본 표정">
      <img class="blush blush--left" src="./assets/blush.svg" alt="" aria-hidden="true" />
      <img class="blush blush--right" src="./assets/blush.svg" alt="" aria-hidden="true" />

      <div class="eye eye--left" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>
      <div class="eye eye--right" aria-hidden="true"><span class="pupil"></span><span class="glint"></span></div>

      <span class="happy-eye happy-eye--left" aria-hidden="true"></span>
      <span class="happy-eye happy-eye--right" aria-hidden="true"></span>
    </main>
  </body>
</html>
