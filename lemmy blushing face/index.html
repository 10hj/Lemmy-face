<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Blushing Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="artwork" aria-label="깜빡이는 두 눈과 분홍색 볼터치">
      <div class="eye eye--left" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <div class="eye eye--right" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <span class="blush blush--left" aria-hidden="true"></span>
      <span class="blush blush--right" aria-hidden="true"></span>
    </main>
  </body>
</html>
