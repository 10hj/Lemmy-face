<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Sparkling Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="face" aria-label="빛을 바라보며 초롱초롱하게 반짝이는 눈">
      <div class="eye eye--left" aria-hidden="true">
        <span class="pupil"></span>
        <span class="eye-glint"></span>
      </div>
      <div class="eye eye--right" aria-hidden="true">
        <span class="pupil"></span>
        <span class="eye-glint"></span>
      </div>

      <div class="sparkle-field" aria-hidden="true">
        <span class="halo halo--left"></span>
        <span class="halo halo--right"></span>

        <img class="hero-sparkle hero-sparkle--left" src="./assets/sparkle-small.svg" alt="" />
        <img class="hero-sparkle hero-sparkle--right-small" src="./assets/sparkle-medium.svg" alt="" />
        <img class="hero-sparkle hero-sparkle--right-large" src="./assets/sparkle-large.svg" alt="" />

        <span class="mote mote--1"></span><span class="mote mote--2"></span>
        <span class="mote mote--3"></span><span class="mote mote--4"></span>
        <span class="mote mote--5"></span><span class="mote mote--6"></span>
        <span class="mote mote--7"></span><span class="mote mote--8"></span>
      </div>
    </main>
  </body>
</html>
