<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Celebration Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="artwork" aria-label="Happy eyes celebrating with fireworks and confetti">
      <div class="eye eye--left" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <div class="eye eye--right" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
      </div>

      <span class="happy-eye happy-eye--left" aria-hidden="true"></span>
      <span class="happy-eye happy-eye--right" aria-hidden="true"></span>

      <div class="celebration-layer" aria-hidden="true">
        <img class="firework firework--center" src="./assets/firework.svg" alt="" />
        <img class="firework firework--left" src="./assets/firework.svg" alt="" />
        <img class="firework firework--right" src="./assets/firework.svg" alt="" />

        <span class="confetti confetti--1"></span><span class="confetti confetti--2"></span>
        <span class="confetti confetti--3"></span><span class="confetti confetti--4"></span>
        <span class="confetti confetti--5"></span><span class="confetti confetti--6"></span>
        <span class="confetti confetti--7"></span><span class="confetti confetti--8"></span>
        <span class="confetti confetti--9"></span><span class="confetti confetti--10"></span>
        <span class="confetti confetti--11"></span><span class="confetti confetti--12"></span>
        <span class="confetti confetti--13"></span><span class="confetti confetti--14"></span>
        <span class="confetti confetti--15"></span><span class="confetti confetti--16"></span>
      </div>
    </main>
  </body>
</html>
