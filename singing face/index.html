<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Musical Eyes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="artwork" aria-label="A pair of stylized eyes with colorful musical notes on a black background">
      <div class="eye eye--left" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
        <span class="eye__lid eye__lid--top"></span>
        <span class="eye__lid eye__lid--bottom"></span>
        <span class="eye__closed-line"></span>
      </div>
      <div class="eye eye--right" aria-hidden="true">
        <span class="eye__pupil"></span>
        <span class="eye__highlight"></span>
        <span class="eye__lid eye__lid--top"></span>
        <span class="eye__lid eye__lid--bottom"></span>
        <span class="eye__closed-line"></span>
      </div>
      <img class="note note--large" src="./assets/tear-large.svg" alt="" aria-hidden="true" />
      <img class="note note--medium" src="./assets/tear-medium.svg" alt="" aria-hidden="true" />
      <img class="note note--small" src="./assets/tear-small.svg" alt="" aria-hidden="true" />
    </main>
  </body>
</html>
